<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundBoard — CRT Barrel Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        canvas#crt-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        .monitor {
            position: relative;
            z-index: 2;
            border: 3px solid #00ff7f;
            border-radius: 12px;
            padding: 8px;
            background: #0a0a0a;
            box-shadow:
                0 0 20px rgba(0,255,127,0.3),
                inset 0 0 40px rgba(0,0,0,0.8);
            max-width: 700px;
            width: 95%;
        }

        .monitor::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px;
            right: -2px; bottom: -2px;
            border-radius: 14px;
            border: 1px solid rgba(0,255,127,0.2);
            pointer-events: none;
        }

        .screen {
            background: #0d0d0d;
            border-radius: 6px;
            padding: 20px;
            position: relative;
            min-height: 450px;
        }

        .screen::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.08) 0px,
                rgba(0,0,0,0.08) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            border-radius: 6px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid #1a3a2a;
            margin-bottom: 16px;
        }

        .title {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            color: #00ff7f;
            text-shadow: 0 0 10px rgba(0,255,127,0.5);
        }

        .title .prompt {
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255,0,255,0.5);
        }

        .header-status {
            font-size: 16px;
            color: #555;
        }

        .header-status .mode {
            color: #ff00ff;
        }

        .sound-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .sound-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px 4px;
            font-family: 'VT323', monospace;
            font-size: 15px;
            color: #ccc;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sound-btn:hover {
            border-color: #00ff7f;
            color: #fff;
            box-shadow: 0 0 12px rgba(0,255,127,0.2);
        }

        .sound-btn:active {
            background: #00ff7f;
            color: #000;
            transform: scale(0.95);
        }

        .sound-btn .key {
            display: block;
            font-size: 10px;
            color: #555;
            margin-top: 2px;
            font-family: 'Press Start 2P', cursive;
        }

        .sound-btn:hover .key {
            color: #00ff7f;
        }

        /* Color variants */
        .sound-btn:nth-child(4n+1) { border-left: 2px solid #00ff7f; }
        .sound-btn:nth-child(4n+2) { border-left: 2px solid #ff00ff; }
        .sound-btn:nth-child(4n+3) { border-left: 2px solid #00ffff; }
        .sound-btn:nth-child(4n+4) { border-left: 2px solid #ff6600; }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid #1a3a2a;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 6px 14px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: #00ff7f;
            color: #00ff7f;
        }

        .btn--primary {
            background: #00ff7f;
            color: #000;
            border-color: #00ff7f;
        }

        .btn--primary:hover {
            background: #00cc66;
        }

        .btn--danger {
            border-color: #ff00ff;
            color: #ff00ff;
        }

        .btn--danger:hover {
            background: #ff00ff;
            color: #000;
        }

        .vol-label {
            font-size: 18px;
            color: #555;
            margin-right: -4px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            outline: none;
            border: 1px solid #333;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00ff7f;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(0,255,127,0.4);
        }

        .vol-value {
            font-size: 18px;
            color: #00ff7f;
            min-width: 45px;
            text-align: right;
        }

        .status-bar {
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #1a3a2a;
            font-size: 15px;
            color: #444;
            display: flex;
            justify-content: space-between;
        }

        .status-bar .info {
            color: #555;
        }

        .status-bar .mic {
            color: #ff00ff;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 8px;
            font-family: 'Press Start 2P', cursive;
            color: #555;
        }

        .toggle {
            width: 36px;
            height: 18px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 9px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle.active {
            background: #003a1e;
            border-color: #00ff7f;
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: #444;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .toggle.active::after {
            left: 20px;
            background: #00ff7f;
            box-shadow: 0 0 6px rgba(0,255,127,0.5);
        }

        .controls-right {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <canvas id="crt-canvas"></canvas>

    <div class="monitor">
        <div class="screen">
            <div class="header">
                <span class="title"><span class="prompt">&gt;</span> SOUNDBOARD</span>
                <span class="header-status">[<span class="mode">MIC</span>] timer: --s</span>
            </div>

            <div class="sound-grid" id="soundGrid">
                <div class="sound-btn">OH<span class="key">Q</span></div>
                <div class="sound-btn">AH<span class="key">W</span></div>
                <div class="sound-btn">YEAH<span class="key">E</span></div>
                <div class="sound-btn">FUCK<span class="key">R</span></div>
                <div class="sound-btn">CUM<span class="key">A</span></div>
                <div class="sound-btn">MOAN<span class="key">S</span></div>
                <div class="sound-btn">SCREAM<span class="key">D</span></div>
                <div class="sound-btn">ORGASM<span class="key">F</span></div>
                <div class="sound-btn">AAH<span class="key">Z</span></div>
                <div class="sound-btn">UGH<span class="key">X</span></div>
                <div class="sound-btn">GROAN<span class="key">C</span></div>
                <div class="sound-btn">SLAP<span class="key">V</span></div>
            </div>

            <div class="controls">
                <button class="btn btn--primary">RANDOM</button>
                <span class="vol-label">VOL</span>
                <input type="range" min="0" max="100" value="80" id="volSlider">
                <span class="vol-value" id="volDisplay">80%</span>

                <div class="controls-right">
                    <div class="toggle-wrap">
                        <span>TIMER</span>
                        <div class="toggle active" id="timerToggle"></div>
                    </div>
                    <button class="btn" id="settingsBtn">SETTINGS</button>
                </div>
            </div>

            <div class="status-bar">
                <span class="info">36 sounds | 12 hotkeys | output: CABLE Input</span>
                <span class="mic">[mic mode]</span>
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // --- Canvas CRT effect ---
        const canvas = document.getElementById('crt-canvas');
        const gl = canvas.getContext('webgl', { alpha: false, antialias: false });
        if (!gl) { document.body.innerHTML = '<div style="color:red;padding:20px">WebGL not supported</div>'; return; }

        let W, H;
        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * (window.devicePixelRatio || 1);
            canvas.height = H * (window.devicePixelRatio || 1);
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        resize();
        window.addEventListener('resize', resize);

        // --- Shaders ---
        const vs = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vs, `
            attribute vec2 aPos;
            varying vec2 vUv;
            void main() {
                vUv = aPos * 0.5 + 0.5;
                gl_Position = vec4(aPos, 0.0, 1.0);
            }
        `);
        gl.compileShader(vs);

        const fs = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fs, `
            precision highp float;
            varying vec2 vUv;
            uniform float uTime;
            uniform float uBarrel;
            uniform float uScan;
            uniform float uNoise;
            uniform float uVig;
            uniform float uChr;

            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }

            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                return mix(
                    mix(hash(i), hash(i + vec2(1,0)), f.x),
                    mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),
                    f.y
                );
            }

            vec2 barrel(vec2 uv, float k) {
                vec2 c = uv - 0.5;
                float r2 = dot(c, c);
                c *= 1.0 + k * r2;
                return c + 0.5;
            }

            void main() {
                vec2 uv = vUv;
                float t = uTime;

                float k = uBarrel + sin(t * 0.8) * 0.03;

                vec2 dR = barrel(uv + vec2(uChr * 1.5, 0.0), k);
                vec2 dG = barrel(uv, k);
                vec2 dB = barrel(uv - vec2(uChr * 1.5, 0.0), k);

                vec3 col = vec3(0.0);

                if (dG.x < 0.0 || dG.x > 1.0 || dG.y < 0.0 || dG.y > 1.0) {
                    col = vec3(0.0);
                } else {
                    // Smooth gradient BG
                    vec2 cv = dG - 0.5;
                    float dist = length(cv);
                    float vignetteRaw = 1.0 - dist * 0.6;
                    float vignetteAlpha = smoothstep(0.0, 0.5, 1.0 - dist);
                    col = vec3(0.02, 0.04, 0.02) + vec3(0.0, 0.02, 0.0) * (1.0 - dist);

                    // Simple scanline shadow
                    float scanY = sin(dG.y * 800.0) * 0.5 + 0.5;
                    col *= 0.85 + 0.15 * (1.0 - step(0.95, scanY));

                    // Chromatic borders
                    col.r *= 1.0 + 0.3 * (1.0 - vignetteRaw);
                }

                if (dR.x >= 0.0 && dR.x <= 1.0 && dR.y >= 0.0 && dR.y <= 1.0) {
                    // only slight color influence
                }

                // Scanlines
                float scan = sin(dG.y * 1200.0 + t * 2.0) * uScan;
                col -= scan * 0.5;

                // Noise
                float n = noise(dG * 800.0 + t * 50.0) * uNoise;
                col += n * 0.3;

                // Vignette
                float vig = 1.0 - uVig * length((uv - 0.5) * 1.6);
                col *= vig;

                // Flicker
                col *= 0.97 + 0.03 * sin(t * 5.7);

                // Mild brightness
                col *= 1.05;

                gl_FragColor = vec4(col, 1.0);
            }
        `);
        gl.compileShader(fs);

        if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS) || !gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
            return;
        }

        const prog = gl.createProgram();
        gl.attachShader(prog, vs);
        gl.attachShader(prog, fs);
        gl.linkProgram(prog);
        if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;

        gl.useProgram(prog);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

        const aPos = gl.getAttribLocation(prog, 'aPos');
        gl.enableVertexAttribArray(aPos);
        gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

        const uTime = gl.getUniformLocation(prog, 'uTime');
        const uBarrel = gl.getUniformLocation(prog, 'uBarrel');
        const uScan = gl.getUniformLocation(prog, 'uScan');
        const uNoise = gl.getUniformLocation(prog, 'uNoise');
        const uVig = gl.getUniformLocation(prog, 'uVig');
        const uChr = gl.getUniformLocation(prog, 'uChr');

        // Params
        let params = {
            barrel: 0.30,
            scan: 0.10,
            noise: 0.05,
            vig: 0.6,
            chr: 0.003
        };

        let running = true;
        let startTime = performance.now();

        function render() {
            if (!running) { requestAnimationFrame(render); return; }

            const t = (performance.now() - startTime) / 1000.0;

            gl.clearColor(0, 0, 0, 1);
            gl.clear(gl.COLOR_BUFFER_BIT);

            gl.uniform1f(uTime, t);
            gl.uniform1f(uBarrel, params.barrel);
            gl.uniform1f(uScan, params.scan);
            gl.uniform1f(uNoise, params.noise);
            gl.uniform1f(uVig, params.vig);
            gl.uniform1f(uChr, params.chr);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(render);
        }

        render();

        // --- UI Interactions ---
        document.getElementById('volSlider').addEventListener('input', function() {
            document.getElementById('volDisplay').textContent = this.value + '%';
        });

        document.getElementById('timerToggle').addEventListener('click', function() {
            this.classList.toggle('active');
        });

        document.getElementById('settingsBtn').addEventListener('click', function() {
            alert('Settings window would open here.\n\nThis is a visual demo of CRT barrel distortion applied to a SoundBoard-like interface.');
        });

        // Sound button click feedback
        document.querySelectorAll('.sound-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.style.background = '#00ff7f';
                this.style.color = '#000';
                setTimeout(() => {
                    this.style.background = '';
                    this.style.color = '';
                }, 150);
            });
        });

        console.log('CRT Barrel SoundBoard demo loaded.');
        console.log('Params:', params);
    })();
    </script>
</body>
</html>
